<!DOCTYPE html>
<html>
<head>
    <title>Spotify Authentication Error</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .error { background-color: #ff6b6b; color: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="error">
        <h2>❌ Authentication Failed</h2>
        <p>Error: {{ERROR_MESSAGE}}</p>
        <p><a href="/login" style="color: white;">Try again</a></p>
    </div>
</body>
</html>
